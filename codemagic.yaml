workflows:
  ios-build-only:
    name: iOS Build Only
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Build IPA
        script: |
          # هاد الكوموند كدير Archive للمشروع
          xcodebuild -workspace "Wispwood.xcworkspace" -scheme "Wispwood" -sdk iphoneos archive -archivePath $PWD/build/Wispwood.xcarchive
          # هاد الكوموند كتحول الـ Archive لـ IPA
          xcodebuild -exportArchive -archivePath $PWD/build/Wispwood.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/*.ipaworkflows:
  ios-build-only:
    name: iOS Build Only
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Build IPA
        script: |
          # هاد الكوموند كتدير Build للعبة مباشرة بلا Fastlane
          xcodebuild -workspace "Wispwood.xcworkspace" -scheme "Wispwood" -sdk iphoneos archive -archivePath $PWD/build/Wispwood.xcarchive
          xcodebuild -exportArchive -archivePath $PWD/build/Wispwood.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/*.ipa
