workflows:
  ios-build-only:
    name: iOS Build Only
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Build IPA
        script: |
          xcodebuild -workspace "Wispwood.xcworkspace" -scheme "Wispwood" -sdk iphoneos archive -archivePath $PWD/build/Wispwood.xcarchive
          xcodebuild -exportArchive -archivePath $PWD/build/Wispwood.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/*.ipa
